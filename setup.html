<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instalasi Dashboard EPI</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 24px;
    }

    main {
      max-width: 520px;
      margin: 8vh auto;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 22px;
    }

    input,
    button {
      width: 100%;
      box-sizing: border-box;
      border-radius: 8px;
      padding: 12px;
      font: inherit;
    }

    input {
      background: #0f172a;
      color: #fff;
      border: 1px solid #475569;
      margin: 8px 0 12px;
    }

    button {
      border: 0;
      background: #d4af37;
      color: #0f172a;
      font-weight: 800;
      cursor: pointer;
    }

    pre {
      white-space: pre-wrap;
      padding: 12px;
      background: #0f172a;
      border-radius: 8px;
      min-height: 44px;
    }

    p {
      color: #94a3b8;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <main>
    <h1>Instalasi Dashboard EPI</h1>
    <p>Installer telah dinonaktifkan setelah konfigurasi awal. Hubungi administrator jika perlu reset.</p>
  </main>
</body>

</html>
